publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.6.0
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  chewie: ^1.8.5
  video_player: ^2.9.1
  sentry_flutter: ^8.9.0
