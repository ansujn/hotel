name: mobile

on:
  push:
    paths: ["mobile/**", "openapi.yaml", ".github/workflows/mobile.yml"]
  pull_request:
    paths: ["mobile/**"]

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
