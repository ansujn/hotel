app = "viktheatre-api"
primary_region = "bom"  # Mumbai

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  API_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
